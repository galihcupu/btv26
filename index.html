<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV 2026</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --text-color: #333;
            --button-bg-light: rgba(255, 255, 255, 0.15);
            --button-border-light: rgba(255, 255, 255, 0.3);
            --button-shadow-1: rgba(0, 0, 0, 0.1);
            --button-shadow-2: rgba(0, 0, 0, 0.05);
            --button-text: #333;
            --shine-gradient: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #1a1a2e;
                --text-color: #e0e0e0;
                --button-bg-light: rgba(0, 0, 0, 0.2);
                --button-border-light: rgba(255, 255, 255, 0.1);
                --button-shadow-1: rgba(0, 0, 0, 0.3);
                --button-shadow-2: rgba(0, 0, 0, 0.15);
                --button-text: #e0e0e0;
                --shine-gradient: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column; /* Mengatur arah menjadi vertikal */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-body);
            color: var(--text-color);
            gap: 15px; /* Memberikan jarak antar tombol */
            padding: 20px;
            box-sizing: border-box;
        }
        
        .liquid-glass-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%; /* Tombol menyesuaikan lebar kontainer */
            max-width: 300px; /* Batas lebar maksimal tombol */
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--button-text);
            text-decoration: none;
            white-space: nowrap;
            background: var(--button-bg-light);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid var(--button-border-light);
            border-radius: 12px;
            box-shadow: 0 8px 16px var(--button-shadow-1), 0 3px 6px var(--button-shadow-2);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .liquid-glass-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--button-shadow-1), 0 5px 10px var(--button-shadow-2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .liquid-glass-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: var(--shine-gradient);
            transform: skewX(-20deg);
            transition: transform 0.6s ease-out;
        }

        .liquid-glass-button:hover::before {
            transform: translateX(200%) skewX(-20deg);
        }
    </style>
</head>
<body>
    <a href="https://maps.app.goo.gl/8AYyfYj1Vj4YfYmh7?g_st=iw" target="_blank" rel="noopener noreferrer" class="liquid-glass-button">Alamat Site</a>
    <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQD1dikP15KtTZ2dC53p6nMfAWCBwAL3ipp958OyNljNeVM" target="_blank" rel="noopener noreferrer" class="liquid-glass-button">Data Aset</a>
    <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQCY1E_3c1cKQLRb3SMKGduMAUFuC6wObp7McUm-OyFlquw" target="_blank" rel="noopener noreferrer" class="liquid-glass-button">Checklist</a>
    <a href="https://idclear01.sharepoint.com/:u:/s/UnitOIT/IQA5ZJFVG-yYSKV1cdVdN6-DAdckft8p2TDBDPgplOtEv98" target="_blank" rel="noopener noreferrer" class="liquid-glass-button">Rack Mapping</a>
    <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQDcxUMj93KOQod0TFuCO5bWAYK8KecDjxsUhn8ZedmZLh4" target="_blank" rel="noopener noreferrer" class="liquid-glass-button">Network Port Mapping</a>
</body>
</html>
