<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV 2026 - Section Layout</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --text-color: #333;
            --button-bg-light: rgba(255, 255, 255, 0.15);
            --button-border-light: rgba(255, 255, 255, 0.3);
            --button-shadow-1: rgba(0, 0, 0, 0.1);
            --button-shadow-2: rgba(0, 0, 0, 0.05);
            --button-text: #333;
            --shine-gradient: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            --section-label: #666;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #1a1a2e;
                --text-color: #e0e0e0;
                --button-bg-light: rgba(0, 0, 0, 0.2);
                --button-border-light: rgba(255, 255, 255, 0.1);
                --button-shadow-1: rgba(0, 0, 0, 0.3);
                --button-shadow-2: rgba(0, 0, 0, 0.15);
                --button-text: #e0e0e0;
                --shine-gradient: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
                --section-label: #aaa;
            }
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .section {
            width: 100%;
            max-width: 900px;
            text-align: center;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--section-label);
            opacity: 0.7;
        }

        /* Grid System */
        .grid {
            display: grid;
            gap: 15px;
        }

        .grid-1 { grid-template-columns: 1fr; justify-items: center; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }

        .liquid-glass-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            width: 100%;
            min-height: 60px;
            box-sizing: border-box;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--button-text);
            text-decoration: none;
            background: var(--button-bg-light);
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid var(--button-border-light);
            border-radius: 12px;
            box-shadow: 0 8px 16px var(--button-shadow-1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .liquid-glass-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--button-shadow-1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .liquid-glass-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: var(--shine-gradient);
            transform: skewX(-20deg);
            transition: transform 0.6s ease-out;
        }

        .liquid-glass-button:hover::before {
            transform: translateX(200%) skewX(-20deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .grid-4, .grid-3 { grid-template-columns: 1fr; }
            .liquid-glass-button { max-width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Section 1: 1 Tombol -->
    <div class="section">
        <div class="section-title">Lokasi</div>
        <div class="grid grid-1">
            <a href="https://maps.app.goo.gl/8AYyfYj1Vj4YfYmh7?g_st=iw" target="_blank" class="liquid-glass-button" style="max-width: 300px;">Alamat Site</a>
        </div>
    </div>

    <!-- Section 2: 4 Tombol -->
    <div class="section">
        <div class="section-title">Data & Mapping</div>
        <div class="grid grid-4">
            <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQD1dikP15KtTZ2dC53p6nMfAWCBwAL3ipp958OyNljNeVM" target="_blank" class="liquid-glass-button">Data Aset</a>
            <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQCY1E_3c1cKQLRb3SMKGduMAUFuC6wObp7McUm-OyFlquw" target="_blank" class="liquid-glass-button">Checklist</a>
            <a href="https://idclear01.sharepoint.com/:u:/s/UnitOIT/IQA5ZJFVG-yYSKV1cdVdN6-DAdckft8p2TDBDPgplOtEv98" target="_blank" class="liquid-glass-button">Rack Mapping</a>
            <a href="https://idclear01.sharepoint.com/:x:/s/UnitOIT/IQDcxUMj93KOQod0TFuCO5bWAYK8KecDjxsUhn8ZedmZLh4" target="_blank" class="liquid-glass-button">Port Mapping</a>
        </div>
    </div>

    <!-- Section 3: 3 Tombol -->
    <div class="section">
        <div class="section-title">Lain-lain</div>
        <div class="grid grid-3">
            <a href="#" class="liquid-glass-button">Internal Doc 1</a>
            <a href="#" class="liquid-glass-button">Internal Doc 2</a>
            <a href="#" class="liquid-glass-button">Internal Doc 3</a>
        </div>
    </div>

</body>
</html>
